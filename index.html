<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#16a34a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/placeholder.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>
      PhyhanAgro Marketplace — Fresh produce from verified Nigerian farms
    </title>
    <meta
      name="description"
      content="PhyhanAgro connects buyers with verified Nigerian farmers and riders. Shop fresh produce, place orders, and chat with sellers in real time."
    />
    <!-- SEO metadata is dynamically set by usePageMeta hook per route -->
    <!-- Root fallback values below are overridden by client-side hooks -->
    <link rel="canonical" href="/" />

    <meta property="og:title" content="PhyhanAgro Marketplace" />
    <meta
      property="og:description"
      content="Direct-from-farm marketplace connecting Nigerian buyers, farmers, and riders."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:secure_url" content="/og-image.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PhyhanAgro Marketplace" />
    <meta
      name="twitter:description"
      content="Direct-from-farm marketplace connecting Nigerian buyers, farmers, and riders."
    />
    <meta name="twitter:image" content="/og-image.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
